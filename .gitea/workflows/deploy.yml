name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force:
        description: "Build/push even if no changes detected for that package"
        type: boolean
        default: true

env:
  REGISTRY: ${{ vars.REGISTRY }}
  NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for backend changes
        id: changes
        run: |
          if [ "${{ inputs.force }}" = "true" ] || git diff --name-only HEAD~1 HEAD | grep -q '^packages/backend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Extract metadata
        if: steps.changes.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/granith-server
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for frontend changes
        id: changes
        run: |
          if [ "${{ inputs.force }}" = "true" ] || git diff --name-only HEAD~1 HEAD | grep -q '^packages/frontend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: packages/frontend
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        working-directory: packages/frontend
        env:
          PUBLIC_API_BASE_URL: ${{ vars.PUBLIC_API_BASE_URL }}
        run: bun run build

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        working-directory: packages/frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@latest pages deploy build --project-name=${{ vars.CF_PAGES_PROJECT_APP }} --branch=main

  deploy-marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for marketing changes
        id: changes
        run: |
          if [ "${{ inputs.force }}" = "true" ] || git diff --name-only HEAD~1 HEAD | grep -q '^packages/marketing/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.changes.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: packages/marketing
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        working-directory: packages/marketing
        run: bun run build

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        working-directory: packages/marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@latest pages deploy dist --project-name=${{ vars.CF_PAGES_PROJECT_MARKETING }} --branch=main
